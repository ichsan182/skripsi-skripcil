<aside class="sidebar">
  <!-- Brand -->
  <div class="sidebar-brand">
    <div class="brand-logo-mark">M</div>
    <div class="brand-copy">
      <h1 class="brand-name">MauWealthy</h1>
      <p class="brand-tagline">Financial Dashboard</p>
    </div>
  </div>

  <!-- Navigation -->
  <nav class="sidebar-nav" aria-label="Main navigation">
    <span class="nav-group-label">Main Menu</span>
    <ul class="nav-list">
      <li *ngFor="let item of navItems">
        <a
          [routerLink]="item.path"
          routerLinkActive="nav-item--active"
          class="nav-item"
        >
          <img [src]="item.icon" [alt]="item.label" class="nav-icon" />
          <span class="nav-label">{{ item.label }}</span>
        </a>
      </li>
    </ul>
  </nav>

  <!-- Profile -->
  <div class="sidebar-profile">
    <img [src]="profileImage" alt="Profile" class="profile-avatar" />
    <div class="profile-info">
      <p class="profile-name">{{ profileName }}</p>
      <p class="profile-email">{{ profileEmail }}</p>
    </div>
  </div>
</aside>
