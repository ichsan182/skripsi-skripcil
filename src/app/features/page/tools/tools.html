<div class="page-container">
  <app-sidebar
    [showRollingBudgetPanel]="true"
    [rollingTotalBudget]="rollingTotalBudget"
    [rollingUsedBudget]="rollingUsedBudget"
    [rollingBudgetRemaining]="rollingBudgetRemaining"
    [rollingDaysRemaining]="rollingDaysRemaining"
    [rollingBudgetToday]="rollingBudgetToday"
  ></app-sidebar>
  <section class="page-content">
    <h1>Tools untuk membantu kamu!</h1>

    <div class="tools-grid">
      <article class="tool-card">
        <div
          class="tool-illustration tool-illustration-calculator"
          role="img"
          aria-label="Ilustrasi kalkulator keuangan"
        ></div>

        <h2>KALKULATOR</h2>

        <p>
          Pemasukan dan Pengeluaran bukan sekedar uang masuk rekening dan hilang
          loh...
        </p>

        <button
          type="button"
          class="tool-start-btn"
          routerLink="/tools/calculator"
        >
          MULAI
        </button>
      </article>

      <article class="tool-card">
        <div
          class="tool-illustration tool-illustration-simulation"
          role="img"
          aria-label="Ilustrasi simulasi investasi"
        ></div>

        <h2>SIMULASI</h2>

        <p>
          Pemasukan dan Pengeluaran bukan sekedar uang masuk rekening dan hilang
          loh...
        </p>

        <button
          type="button"
          class="tool-start-btn"
          routerLink="/tools/simulation"
        >
          MULAI
        </button>
      </article>
    </div>
  </section>
</div>
