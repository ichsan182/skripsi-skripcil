<div class="page-container">
  <app-sidebar
    [showRollingBudgetPanel]="true"
    [rollingTotalBudget]="rollingTotalBudget"
    [rollingUsedBudget]="rollingUsedBudget"
    [rollingBudgetRemaining]="rollingBudgetRemaining"
    [rollingDaysRemaining]="rollingDaysRemaining"
    [rollingBudgetToday]="rollingBudgetToday"
  ></app-sidebar>
  <section class="page-content">
    @if (article) {
    <a class="back-link" routerLink="/education">&larr; Kembali ke Edukasi</a>
    <h1>{{ article.title }}</h1>
    <img class="article-hero" [src]="article.image" [alt]="article.title" />
    <p class="article-intro">{{ article.intro }}</p>
    <div class="article-body" [innerHTML]="safeContent"></div>
    } @else {
    <a class="back-link" routerLink="/education">&larr; Kembali ke Edukasi</a>
    <p class="not-found">Konten tidak ditemukan.</p>
    }
  </section>
</div>
