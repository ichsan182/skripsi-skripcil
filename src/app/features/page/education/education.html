<div class="page-container">
  <app-sidebar
    [showRollingBudgetPanel]="true"
    [rollingTotalBudget]="rollingTotalBudget"
    [rollingUsedBudget]="rollingUsedBudget"
    [rollingBudgetRemaining]="rollingBudgetRemaining"
    [rollingDaysRemaining]="rollingDaysRemaining"
    [rollingBudgetToday]="rollingBudgetToday"
  ></app-sidebar>
  <section class="page-content">
    <h1>Belajar tentang keuangan yuk!</h1>
    <div class="education-grid">
      @for (card of cards; track card.id) {
      <div class="card-education">
        <img [src]="card.image" [alt]="card.title" />
        <h2>{{ card.title }}</h2>
        <p>{{ card.description }}</p>
        <button (click)="navigateTo(card.id)">BACA</button>
      </div>
      }
    </div>
  </section>
</div>
